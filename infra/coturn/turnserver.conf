# Coturn configuration for Pedagogue voice defense
# Placeholders (DROPLET_IP, DOMAIN, COTURN_SECRET) are replaced by setup.sh

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0            # Replaced with droplet IP at deploy time
external-ip=DROPLET_IP      # Placeholder — sed-replaced by setup.sh
realm=pedagogue.app
server-name=pedagogue.app
fingerprint
lt-cred-mech
use-auth-secret
static-auth-secret=COTURN_SECRET  # Placeholder — replaced by setup.sh
total-quota=100
bps-capacity=0
stale-nonce=600
cert=/etc/letsencrypt/live/DOMAIN/fullchain.pem
pkey=/etc/letsencrypt/live/DOMAIN/privkey.pem
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
log-file=/var/log/coturn/turnserver.log
pidfile=/var/run/coturn/turnserver.pid
